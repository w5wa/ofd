<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>OFD Viewer</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto,
                   "Noto Sans Arabic", Arial, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #121212; color: #e0e0e0; }
      #toolbar { background: #1e1e1e; border-bottom-color: #333; }
      .page-container { background: #1e1e1e; }
    }

    /* ── Toolbar ───────────────────────────────────────────────────── */
    #toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }

    #page-info {
      font-size: .85rem;
      min-width: 6em;
      text-align: center;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: #1a6c3c;
      color: #fff;
      cursor: pointer;
      font-size: .9rem;
    }
    button:disabled { opacity: .4; cursor: default; }
    button:not(:disabled):hover { background: #145530; }

    /* ── Page area ─────────────────────────────────────────────────── */
    #pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 16px 8px 40px;
    }

    .page-container {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
      border-radius: 4px;
      overflow: hidden;
      max-width: 100%;
    }

    .page-container svg, .page-container canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* ── Status / error ────────────────────────────────────────────── */
    #status {
      text-align: center;
      padding: 40px 20px;
      font-size: 1rem;
      color: #555;
    }

    #status.error { color: #c62828; }
  </style>
</head>
<body>

<div id="toolbar" role="toolbar">
  <button id="btn-prev" disabled aria-label="Previous page">&#8249;</button>
  <span id="page-info">—</span>
  <button id="btn-next" disabled aria-label="Next page">&#8250;</button>
</div>

<div id="pages">
  <div id="status">Loading OFD document…</div>
</div>

<!--
  ofd.js — place the compiled ofd.js bundle in the same assets/viewer/ folder.
  Download from: https://github.com/DLTech21/ofd.js/releases
  File name expected: ofd.js
-->
<script>
// ── Minimal OFD.js integration ──────────────────────────────────────────────
//
// This page is loaded inside an Android WebView. The native side injects
// `OfdBridge` as a JavaScript interface with two methods:
//   • OfdBridge.getOfdBase64()  → base64-encoded OFD file bytes
//   • OfdBridge.getOfdPath()    → absolute path (informational)
//
// We decode the base64 into a Blob, then hand it to ofd.js for rendering.
// If ofd.js is not present (file not yet placed in assets), a clear message
// is shown to the user.
// ────────────────────────────────────────────────────────────────────────────

const pagesDiv  = document.getElementById('pages');
const statusDiv = document.getElementById('status');
const pageInfo  = document.getElementById('page-info');
const btnPrev   = document.getElementById('btn-prev');
const btnNext   = document.getElementById('btn-next');

let currentPage = 0;
let totalPages  = 0;
let ofdPages    = [];   // rendered page elements

function setStatus(msg, isError) {
  statusDiv.textContent = msg;
  statusDiv.className   = isError ? 'error' : '';
  statusDiv.style.display = 'block';
}

function hideStatus() {
  statusDiv.style.display = 'none';
}

function updateNav() {
  pageInfo.textContent = totalPages ? `${currentPage + 1} / ${totalPages}` : '—';
  btnPrev.disabled = currentPage <= 0;
  btnNext.disabled = currentPage >= totalPages - 1;
}

function showPage(idx) {
  ofdPages.forEach((el, i) => {
    el.style.display = i === idx ? '' : 'none';
  });
  currentPage = idx;
  updateNav();
}

btnPrev.addEventListener('click', () => { if (currentPage > 0) showPage(currentPage - 1); });
btnNext.addEventListener('click', () => { if (currentPage < totalPages - 1) showPage(currentPage + 1); });

// ── Bootstrap ──────────────────────────────────────────────────────────────
window.addEventListener('load', function () {
  // Give the WebView time to inject OfdBridge
  setTimeout(init, 300);
});

function init() {
  if (typeof OfdBridge === 'undefined') {
    setStatus(
      'OfdBridge interface not found. This page must be opened inside the OFDRW Android app.',
      true
    );
    return;
  }

  // Check that ofd.js is available
  if (typeof window.OFD === 'undefined' && typeof window.parseOFD === 'undefined') {
    setStatus(
      'ofd.js library not found.\n\n' +
      'Download ofd.js from https://github.com/DLTech21/ofd.js/releases ' +
      'and place ofd.js in the app assets/viewer/ folder, then rebuild.',
      true
    );
    return;
  }

  const b64 = OfdBridge.getOfdBase64();
  if (!b64) {
    setStatus('Could not read OFD file data.', true);
    return;
  }

  renderOfd(b64);
}

function b64ToBlob(b64, type) {
  const binary = atob(b64);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type });
}

async function renderOfd(b64) {
  setStatus('Rendering pages…');
  try {
    const blob = b64ToBlob(b64, 'application/ofd');
    const url  = URL.createObjectURL(blob);

    // ofd.js API — adapt based on the actual version you bundle
    const result = await parseOFD(url);          // returns array of page SVG strings or elements

    URL.revokeObjectURL(url);

    pagesDiv.innerHTML = '';
    ofdPages = [];

    result.forEach(function (pageContent) {
      const wrapper = document.createElement('div');
      wrapper.className = 'page-container';

      if (typeof pageContent === 'string') {
        wrapper.innerHTML = pageContent;
      } else if (pageContent instanceof Element) {
        wrapper.appendChild(pageContent);
      }

      pagesDiv.appendChild(wrapper);
      ofdPages.push(wrapper);
    });

    totalPages = ofdPages.length;
    hideStatus();
    showPage(0);
  } catch (err) {
    setStatus('Error rendering OFD: ' + err.message, true);
  }
}
</script>

<!-- ofd.js is loaded last so it can be absent without breaking the rest of the UI -->
<script src="ofd.js" onerror="console.warn('ofd.js not found — see instructions in this file')"></script>

</body>
</html>
