error.tosvg.usage=Usage: to-svg <input.ofd> <output-dir> [ppm]
error.tohtml.usage=Usage: to-html <input.ofd> <output.html> [screen-width]
error.merge.usage=Usage: merge <output.ofd> <input1.ofd> [input2.ofd ...]
error.info.usage=Usage: info <input.ofd>

