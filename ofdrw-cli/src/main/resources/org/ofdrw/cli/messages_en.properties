# OFDRW CLI - English messages
usage.header=OFDRW CLI v2.3.9 - OFD Document Tool
usage.usage=Usage:  java -jar ofdrw-cli-2.3.9.jar [--lang en|ar] <command> [options]
usage.commands=Commands:
usage.cmd.topdf=  to-pdf    <input.ofd> <output.pdf>              Convert OFD to PDF
usage.cmd.toimage=  to-image  <input.ofd> <output-dir> [ppm]        Convert OFD pages to PNG images (default ppm=7)
usage.cmd.tosvg=  to-svg    <input.ofd> <output-dir> [ppm]        Convert OFD pages to SVG
usage.cmd.tohtml=  to-html   <input.ofd> <output.html> [width]     Convert OFD to HTML (default width=1920)
usage.cmd.merge=  merge     <out.ofd> <in1.ofd> [in2.ofd ...]     Merge OFD files
usage.cmd.info=  info      <input.ofd>                           Print document information
usage.examples=Examples:
usage.ex1=  java -jar ofdrw-cli-2.3.9.jar to-pdf   input.ofd output.pdf
usage.ex2=  java -jar ofdrw-cli-2.3.9.jar to-image input.ofd ./images 10.0
usage.ex3=  java -jar ofdrw-cli-2.3.9.jar to-svg   input.ofd ./svg
usage.ex4=  java -jar ofdrw-cli-2.3.9.jar to-html  input.ofd output.html 1280
usage.ex5=  java -jar ofdrw-cli-2.3.9.jar merge    merged.ofd file1.ofd file2.ofd
usage.ex6=  java -jar ofdrw-cli-2.3.9.jar info     input.ofd

error.unknown.command=Unknown command: {0}
error.topdf.usage=Usage: to-pdf <input.ofd> <output.pdf>
