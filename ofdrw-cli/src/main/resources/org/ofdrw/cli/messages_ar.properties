# OFDRW CLI - Arabic messages (RTL)
usage.header=OFDRW CLI v2.3.9 - \u0623\u062f\u0627\u0629 \u0645\u0633\u062a\u0646\u062f OFD
usage.usage=\u0627\u0644\u0627\u0633\u062a\u062e\u062f\u0627\u0645:  java -jar ofdrw-cli-2.3.9.jar [--lang en|ar] <\u0623\u0645\u0631> [\u062e\u064a\u0627\u0631\u0627\u062a]
usage.commands=\u0627\u0644\u0623\u0648\u0627\u0645\u0631:
usage.cmd.topdf=  to-pdf    <\u0645\u062f\u062e\u0644.ofd> <\u0645\u062e\u0631\u062c.pdf>           \u062a\u062d\u0648\u064a\u0644 OFD \u0625\u0644\u0649 PDF
usage.cmd.toimage=  to-image  <\u0645\u062f\u062e\u0644.ofd> <\u0645\u062c\u0644\u062f-\u0627\u0644\u0645\u062e\u0631\u062c> [\u062f\u0642\u0629]    \u062a\u062d\u0648\u064a\u0644 \u0635\u0641\u062d\u0627\u062a OFD \u0625\u0644\u0649 \u0635\u0648\u0631 PNG
usage.cmd.tosvg=  to-svg    <\u0645\u062f\u062e\u0644.ofd> <\u0645\u062c\u0644\u062f-\u0627\u0644\u0645\u062e\u0631\u062c> [\u062f\u0642\u0629]    \u062a\u062d\u0648\u064a\u0644 \u0635\u0641\u062d\u0627\u062a OFD \u0625\u0644\u0649 SVG
usage.cmd.tohtml=  to-html   <\u0645\u062f\u062e\u0644.ofd> <\u0645\u062e\u0631\u062c.html> [\u0639\u0631\u0636]   \u062a\u062d\u0648\u064a\u0644 OFD \u0625\u0644\u0649 HTML
usage.cmd.merge=  merge     <\u0645\u062e\u0631\u062c.ofd> <\u0645\u062f\u062e\u0644\u061f.ofd> [...]      \u062f\u0645\u062c \u0645\u0644\u0641\u0627\u062a OFD
usage.cmd.info=  info      <\u0645\u062f\u062e\u0644.ofd>                       \u0639\u0631\u0636 \u0645\u0639\u0644\u0648\u0645\u0627\u062a \u0627\u0644\u0645\u0633\u062a\u0646\u062f
usage.examples=\u0623\u0645\u062b\u0644\u0629:
usage.ex1=  java -jar ofdrw-cli-2.3.9.jar to-pdf   input.ofd output.pdf
usage.ex2=  java -jar ofdrw-cli-2.3.9.jar to-image input.ofd ./images 10.0
usage.ex3=  java -jar ofdrw-cli-2.3.9.jar to-svg   input.ofd ./svg
usage.ex4=  java -jar ofdrw-cli-2.3.9.jar to-html  input.ofd output.html 1280
usage.ex5=  java -jar ofdrw-cli-2.3.9.jar merge    merged.ofd file1.ofd file2.ofd
usage.ex6=  java -jar ofdrw-cli-2.3.9.jar info     input.ofd

