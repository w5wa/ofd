name: Build Native Packages (ARM64)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # macOS M1 / Apple Silicon (ARM64)
  # ──────────────────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: macOS M1 (ARM64) package
    runs-on: macos-14           # Apple Silicon runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (ARM64)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build fat JAR
        run: mvn -q -DskipTests package -pl ofdrw-cli -am

      - name: Create macOS app bundle with jpackage
        run: |
          mkdir -p dist/macos-arm64
          jpackage \
            --input ofdrw-cli/target \
            --main-jar ofdrw-cli-2.3.9.jar \
            --main-class org.ofdrw.cli.Main \
            --name "OFDRW" \
            --app-version "2.3.9" \
            --vendor "OFDRW" \
            --description "OFD Reader & Writer CLI" \
            --type dmg \
            --dest dist/macos-arm64 \
            --java-options "-Dfile.encoding=UTF-8"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: OFDRW-macOS-arm64
          path: dist/macos-arm64/*.dmg
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/macos-arm64/*.dmg

  # ──────────────────────────────────────────────────────────────────────────
  # Ubuntu ARM64 (suitable for Raspberry Pi, AWS Graviton, etc.)
  # ──────────────────────────────────────────────────────────────────────────
  build-ubuntu-arm64:
    name: Ubuntu ARM64 package
    runs-on: ubuntu-24.04-arm   # GitHub-hosted Ubuntu ARM64 runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (ARM64)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install fakeroot (required by jpackage for .deb)
        run: sudo apt-get install -y fakeroot binutils

      - name: Build fat JAR
        run: mvn -q -DskipTests package -pl ofdrw-cli -am

      - name: Create .deb package with jpackage
        run: |
          mkdir -p dist/ubuntu-arm64
          jpackage \
            --input ofdrw-cli/target \
            --main-jar ofdrw-cli-2.3.9.jar \
            --main-class org.ofdrw.cli.Main \
            --name ofdrw \
            --app-version "2.3.9" \
            --vendor "OFDRW" \
            --description "OFD Reader & Writer CLI" \
            --type deb \
            --dest dist/ubuntu-arm64 \
            --java-options "-Dfile.encoding=UTF-8" \
            --linux-shortcut

      - name: Upload Ubuntu .deb
        uses: actions/upload-artifact@v4
        with:
          name: OFDRW-ubuntu-arm64
          path: dist/ubuntu-arm64/*.deb
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ubuntu-arm64/*.deb
