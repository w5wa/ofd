name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK (arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & build tools
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Download ofd.js
        # Download the pre-built ofd.js bundle from the official releases.
        # Pin to a specific release tag for reproducibility.
        run: |
          curl -fsSL \
            "https://cdn.jsdelivr.net/npm/ofd.js@latest/dist/ofd.umd.js" \
            -o ofdrw-android/app/src/main/assets/viewer/ofd.js \
          || echo "WARNING: Could not download ofd.js — viewer will show instructions"

      - name: Build debug APK
        working-directory: ofdrw-android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK (unsigned)
        working-directory: ofdrw-android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OFDRW-Android-debug
          path: ofdrw-android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: OFDRW-Android-release-unsigned
          path: ofdrw-android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ofdrw-android/app/build/outputs/apk/debug/*.apk
            ofdrw-android/app/build/outputs/apk/release/*.apk
